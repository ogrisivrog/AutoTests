name: Запуск тестов

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  tests:
    name: Прогон тестов
    runs-on: ubuntu-latest

    steps:
      - name: Клонирую репозиторий
        uses: actions/checkout@v4

      - name: Ставлю Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Устанавливаю зависимости
        run: pip install -r requirements.txt

      - name: Копирую env файл
        run: cp .env.example .env

      - name: Запускаю smoke тесты
        run: pytest -m smoke -v --override-ini="addopts=-v --tb=short"

      - name: Запускаю все тесты
        run: pytest --override-ini="addopts=-v --tb=short --alluredir=reports/allure-results"

      - name: Сохраняю результаты allure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: reports/allure-results
          retention-days: 14

  docker:
    name: Проверяю сборку докера
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Клонирую репозиторий
        uses: actions/checkout@v4

      - name: Собираю образ
        run: docker build -f docker/Dockerfile -t qa-pet .

      - name: Запускаю smoke в контейнере
        run: |
          docker run --rm \
            -e BASE_URL=https://jsonplaceholder.typicode.com \
            qa-pet \
            pytest -m smoke -v --override-ini="addopts=-v --tb=short"
